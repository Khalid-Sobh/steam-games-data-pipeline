version: 2

models:

  - name: metacritic_by_genre
    description: >
      Average Metacritic score per genre. Used for Dashboard Tile 1.
      Only genres with at least 20 rated games are included.
    columns:
      - name: genre
        description: "Steam genre tag"
        tests:
          - not_null
          - unique
      - name: avg_metacritic_score
        description: "Average Metacritic score for this genre"
        tests:
          - not_null
      - name: rated_game_count
        description: "Number of rated games in this genre"

  - name: releases_by_year_and_tier
    description: >
      Count of games released per year, broken down by price tier.
      Used for Dashboard Tile 2 (stacked bar chart).
    columns:
      - name: release_year
        description: "Year of release"
        tests:
          - not_null
      - name: price_tier
        description: "Free / Budget / Mid / Premium"
        tests:
          - not_null
          - accepted_values:
              values: ["Free", "Budget", "Mid", "Premium"]
      - name: game_count
        description: "Number of games released in this year/tier combination"
        tests:
          - not_null
